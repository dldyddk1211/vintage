<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JP 소싱 대시보드</title>
  <style>
    :root {
      --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a;
      --accent:#4f8ef7; --accent2:#7c5cbf;
      --green:#2ecc71; --red:#e74c3c; --yellow:#f39c12; --orange:#e67e22;
      --text:#e0e0e0; --muted:#7a7f9a;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; }

    header { background:var(--card); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; gap:14px; }
    .logo  { font-size:1.2rem; font-weight:700; color:var(--accent); }
    .sub   { font-size:0.8rem; color:var(--muted); margin-top:2px; }
    .rate-badge { margin-left:auto; background:#1e2433; border:1px solid var(--border); border-radius:8px; padding:6px 14px; font-size:0.85rem; }
    .rate-badge span { color:var(--yellow); font-weight:700; }

    .container { max-width:1400px; margin:0 auto; padding:24px 20px; }

    .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px; }
    .stat-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px; }
    .stat-card .lbl { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
    .stat-card .val { font-size:1.7rem; font-weight:700; }
    .stat-card .hint{ font-size:0.7rem; color:var(--muted); margin-top:4px; }
    .c-blue{color:var(--accent)} .c-green{color:var(--green)} .c-yellow{color:var(--yellow)} .c-red{color:var(--red)}

    .panel { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:18px; }
    .panel-title { font-size:0.92rem; font-weight:600; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; gap:8px; }

    /* 버튼 */
    .btn { padding:9px 18px; border-radius:7px; border:none; font-size:0.85rem; font-weight:600; cursor:pointer; display:inline-flex; align-items:center; gap:6px; transition:opacity .15s,transform .1s; }
    .btn:hover  { opacity:.85; }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.35; cursor:not-allowed; }
    .b-blue   { background:var(--accent);  color:#fff; }
    .b-green  { background:var(--green);   color:#fff; }
    .b-purple { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; }
    .b-yellow { background:var(--yellow);  color:#000; }
    .b-red    { background:var(--red);     color:#fff; }
    .b-gray   { background:#2a2d3a;        color:var(--text); }

    .btn-row { display:flex; gap:10px; flex-wrap:wrap; }

    .opts { display:flex; align-items:center; gap:12px; margin-top:12px; flex-wrap:wrap; }
    .opts label { font-size:0.78rem; color:var(--muted); }
    .opts input[type=number] { background:#0f1117; border:1px solid var(--border); color:var(--text); padding:5px 9px; border-radius:5px; width:80px; font-size:0.82rem; }

    .schedule-pill { display:inline-flex; align-items:center; gap:6px; background:#1e2433; border:1px solid var(--border); border-radius:20px; padding:4px 12px; font-size:0.78rem; color:var(--yellow); margin-top:12px; }
    .dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* 로그 */
    .log-box { background:#080a0f; border:1px solid var(--border); border-radius:8px; height:260px; overflow-y:auto; padding:12px 14px; font-family:'Consolas',monospace; font-size:0.77rem; line-height:1.8; }
    .log-line      { color:#9ca3af; }
    .log-line.ok   { color:var(--green); }
    .log-line.err  { color:var(--red); }
    .log-line.warn { color:var(--yellow); }
    .log-line.info { color:#60a5fa; }

    /* 필터 영역 */
    .filter-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
    .search-input { background:#0f1117; border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:7px; font-size:0.85rem; width:220px; }
    .search-input:focus { outline:none; border-color:var(--accent); }
    .brand-select { background:#0f1117; border:1px solid var(--border); color:var(--text); padding:7px 12px; border-radius:7px; font-size:0.85rem; cursor:pointer; }
    .brand-select:focus { outline:none; border-color:var(--accent); }

    /* 선택 정보 바 */
    .select-bar { display:flex; align-items:center; gap:14px; padding:10px 14px; background:#1a2433; border:1px solid #2a3a4a; border-radius:8px; margin-bottom:12px; font-size:0.85rem; }
    .select-count { color:var(--accent); font-weight:700; }

    /* 중복 알림 */
    .dup-alert { background:#2a1a1a; border:1px solid var(--red); border-radius:8px; padding:12px 16px; margin-bottom:12px; font-size:0.82rem; }
    .dup-alert .dup-title { color:var(--red); font-weight:700; margin-bottom:8px; }
    .price-change { background:#2a2000; border:1px solid var(--yellow); border-radius:8px; padding:12px 16px; margin-bottom:12px; font-size:0.82rem; }
    .price-change .pc-title { color:var(--yellow); font-weight:700; margin-bottom:8px; }

    /* 테이블 */
    .tbl-wrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    th,td { padding:9px 12px; text-align:left; border-bottom:1px solid var(--border); }
    th { color:var(--muted); font-size:0.73rem; font-weight:500; background:#141720; position:sticky; top:0; }
    tr:hover td { background:#1e2130; }
    tr.selected-row td { background:#1a2433; }
    .pimg { width:44px; height:44px; object-fit:cover; border-radius:5px; background:#1e2433; }
    .badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:0.73rem; font-weight:600; }
    .b-jpy { background:#1a2a3a; color:#60a5fa; }
    .b-krw { background:#1a2e1a; color:#4ade80; }
    .b-brand { background:#2a1a3a; color:#c084fc; }
    .b-code  { background:#1a1a2a; color:#94a3b8; font-family:monospace; font-size:0.7rem; }

    /* 체크박스 */
    input[type=checkbox] { width:16px; height:16px; cursor:pointer; accent-color:var(--accent); }

    .pager { display:flex; justify-content:center; gap:7px; margin-top:16px; }
    .pager button { padding:5px 12px; background:var(--card); border:1px solid var(--border); color:var(--text); border-radius:5px; cursor:pointer; font-size:0.78rem; }
    .pager button.on  { background:var(--accent); border-color:var(--accent); }
    .pager button:disabled { opacity:.35; cursor:not-allowed; }

    .spinner { display:inline-block; width:12px; height:12px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    @keyframes spin { to{transform:rotate(360deg)} }

    @media(max-width:900px) { .stat-grid{grid-template-columns:repeat(2,1fr)} }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">🛒 JP 소싱 대시보드</div>
    <div class="sub">Xebio セール 전체 수집 → 브랜드 필터 → 네이버 카페 업로드</div>
  </div>
  <div class="rate-badge">💱 환율 <span id="rate">-</span> / 1엔</div>
</header>

<div class="container">

  <!-- 상태 카드 -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="lbl">수집된 상품</div>
      <div class="val c-blue" id="s-count">0</div>
      <div class="hint">마지막: <span id="s-last-scrape">-</span></div>
    </div>
    <div class="stat-card">
      <div class="lbl">선택된 상품</div>
      <div class="val c-yellow" id="s-selected">0</div>
      <div class="hint">업로드 대상</div>
    </div>
    <div class="stat-card">
      <div class="lbl">업로드 완료</div>
      <div class="val c-green" id="s-uploaded">0</div>
      <div class="hint">마지막: <span id="s-last-upload">-</span></div>
    </div>
    <div class="stat-card">
      <div class="lbl">스크래핑 상태</div>
      <div class="val" id="s-scraping"><span class="c-green">대기 중 ✓</span></div>
      <div class="hint" id="s-upload-status">업로드 대기중</div>
    </div>
  </div>

  <!-- 컨트롤 -->
  <div class="panel">
    <div class="panel-title">⚙️ 실행 컨트롤</div>
    <div class="btn-row">
      <button class="btn b-blue"   id="btn-scrape" onclick="runScrape()">🔍 수동 스크래핑</button>
      <button class="btn b-green"  id="btn-upload" onclick="runUpload()">📤 선택 상품 업로드</button>
      <button class="btn b-purple" id="btn-auto"   onclick="runAuto()">⚡ 자동 실행</button>
      <button class="btn b-yellow" id="btn-pause"  onclick="togglePause()" style="display:none">⏸️ 일시정지</button>
      <button class="btn b-red"    id="btn-reset"  onclick="runReset()">🔄 리셋</button>
    </div>
    <div class="opts">
      <label>테스트 페이지 수</label>
      <input type="number" id="max-pages"  placeholder="전체" min="1">
      <label>업로드 최대 개수</label>
      <input type="number" id="max-upload" placeholder="전체" min="1">
    </div>
    <div class="schedule-pill"><div class="dot"></div> 자동 스케줄 활성화 — 매일 <span id="s-schedule">-</span> 실행</div>
  </div>

  <!-- 실시간 로그 -->
  <div class="panel">
    <div class="panel-title">
      <span>📋 실시간 로그</span>
      <button onclick="clearLog()" class="btn b-gray" style="padding:4px 10px;font-size:0.75rem">지우기</button>
    </div>
    <div class="log-box" id="log-box">
      <div class="log-line info">[시스템] 대시보드 연결됨.</div>
    </div>
  </div>

  <!-- 상품 목록 -->
  <div class="panel">
    <div class="panel-title">
      <span>📦 수집된 상품 목록</span>
      <button class="btn b-green" onclick="uploadSelected()" style="padding:7px 14px">📤 선택 상품 업로드 (<span id="sel-cnt">0</span>개)</button>
    </div>

    <!-- 필터 바 -->
    <div class="filter-bar">
      <input class="search-input" type="text" id="search-input" placeholder="🔍 상품명 / 품번 검색..." oninput="onFilter()">
      <select class="brand-select" id="brand-select" onchange="onFilter()">
        <option value="ALL">모든 브랜드</option>
      </select>
      <button class="btn b-gray" onclick="onFilter()" style="padding:7px 12px;font-size:0.82rem">적용</button>
      <button class="btn b-gray" onclick="resetFilter()" style="padding:7px 12px;font-size:0.82rem">초기화</button>
      <span style="color:var(--muted);font-size:0.8rem" id="filter-result"></span>
    </div>

    <!-- 중복/가격변동 알림 영역 -->
    <div id="dup-area"></div>

    <!-- 선택 바 -->
    <div class="select-bar">
      <span>선택: <span class="select-count" id="sel-cnt2">0</span>개</span>
      <button class="btn b-gray" onclick="selectAll(true)"  style="padding:5px 10px;font-size:0.78rem">✅ 전체 선택</button>
      <button class="btn b-gray" onclick="selectAll(false)" style="padding:5px 10px;font-size:0.78rem">☐ 전체 해제</button>
      <button class="btn b-blue" onclick="checkDuplicate()" style="padding:5px 10px;font-size:0.78rem">🔍 중복 체크</button>
    </div>

    <div class="tbl-wrap">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="chk-all" onchange="selectAll(this.checked)" title="전체선택/해제"></th>
            <th>이미지</th>
            <th>브랜드</th>
            <th>상품명</th>
            <th>품번</th>
            <th>일본가</th>
            <th>구매대행가</th>
            <th>링크</th>
            <th>수집시각</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="9" style="text-align:center;color:var(--muted);padding:40px">스크래핑을 실행하면 상품이 표시됩니다.</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pager" id="pager"></div>
  </div>

</div>

<script>
const PREFIX = "/jp_sourcing";
let curPage = 1;
const PER = 50;
let isPaused = false;
let checkedIndices = new Set();   // 전체 선택된 인덱스
let pageIndexMap = [];            // 현재 페이지 상품의 전체 인덱스

// ── SSE 실시간 로그 ──────────────────────────
const logBox = document.getElementById("log-box");
const es = new EventSource(PREFIX + "/logs/stream");
es.onmessage = e => {
  const { msg } = JSON.parse(e.data);
  if (msg === ".") return;
  const d = document.createElement("div");
  d.className = "log-line";
  if (/\u2705|\uD83C\uDF89|완료|성공/.test(msg))   d.classList.add("ok");
  else if (/\u274C|오류|실패/.test(msg))             d.classList.add("err");
  else if (/\u26A0\uFE0F|타임아웃|중복|차단/.test(msg)) d.classList.add("warn");
  else if (/\uD83D\uDCE1|\uD83D\uDCC4|\u23F0|\uD83D\uDD0D|\uD83D\uDCE4|\uD83D\uDC5F/.test(msg)) d.classList.add("info");
  d.textContent = msg;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
};
function clearLog() { logBox.innerHTML = ""; }

// ── 버튼 액션 ────────────────────────────────
async function runScrape() {
  const mp = document.getElementById("max-pages").value;
  checkedIndices.clear();
  updateSelCount();
  await post("/run/scrape", { max_pages: mp ? +mp : null });
}
async function runUpload() {
  await uploadSelected();
}
async function runAuto() {
  checkedIndices.clear();
  updateSelCount();
  await post("/run/auto", {});
}

async function uploadSelected() {
  if (checkedIndices.size === 0) {
    addLog("⚠️ 선택된 상품이 없습니다. 체크박스로 상품을 선택해주세요", "warn");
    return;
  }
  // 서버에 선택 상태 저장
  await fetch(PREFIX + "/products/update", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ selected: [...checkedIndices] })
  });
  const mu = document.getElementById("max-upload").value;
  addLog(`📤 ${checkedIndices.size}개 상품 업로드 시작...`, "info");
  await post("/run/upload", { max_upload: mu ? +mu : null });
}

async function togglePause() {
  const btn = document.getElementById("btn-pause");
  if (!isPaused) {
    await post("/run/pause", {});
    isPaused = true;
    btn.textContent = "▶️ 재개";
    btn.classList.replace("b-yellow", "b-green");
  } else {
    await post("/run/resume", {});
    isPaused = false;
    btn.textContent = "⏸️ 일시정지";
    btn.classList.replace("b-green", "b-yellow");
  }
}

async function runReset() {
  if (!confirm("⚠️ 리셋하면 수집된 모든 데이터가 삭제됩니다. 정말 리셋하시겠어요?")) return;
  await post("/run/reset", {});
  isPaused = false;
  checkedIndices.clear();
  updateSelCount();
  document.getElementById("btn-pause").style.display = "none";
  document.getElementById("dup-area").innerHTML = "";
  setTimeout(() => loadProducts(1), 800);
}

async function post(path, body) {
  try {
    const r = await fetch(PREFIX + path, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    addLog("🚀 " + d.message, "info");
  } catch(e) { addLog("❌ 요청 실패: " + e, "err"); }
}

function addLog(msg, cls="") {
  const d = document.createElement("div");
  d.className = "log-line " + cls;
  d.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
}

function setBtn(on) {
  ["btn-scrape","btn-upload","btn-auto"].forEach(id => {
    document.getElementById(id).disabled = !on;
  });
}

// ── 브랜드 필터 ──────────────────────────────
async function loadBrands() {
  try {
    const d = await fetch(PREFIX + "/products/brands").then(r => r.json());
    const sel = document.getElementById("brand-select");
    const brands = d.brands || [];
    const counts = d.counts || {};
    sel.innerHTML = '<option value="ALL">모든 브랜드</option>';
    brands.forEach(b => {
      const o = document.createElement("option");
      o.value = b;
      o.textContent = `${b} (${counts[b] || 0})`;
      sel.appendChild(o);
    });
  } catch(e) {}
}

function onFilter() {
  curPage = 1;
  loadProducts(1);
}

function resetFilter() {
  document.getElementById("search-input").value = "";
  document.getElementById("brand-select").value = "ALL";
  curPage = 1;
  loadProducts(1);
}

// ── 체크박스 ─────────────────────────────────
function selectAll(checked) {
  document.getElementById("chk-all").checked = checked;
  const rows = document.querySelectorAll(".row-chk");
  rows.forEach(chk => {
    chk.checked = checked;
    const idx = +chk.dataset.idx;
    if (checked) checkedIndices.add(idx);
    else checkedIndices.delete(idx);
    chk.closest("tr").classList.toggle("selected-row", checked);
  });
  updateSelCount();
}

function onRowCheck(chk) {
  const idx = +chk.dataset.idx;
  if (chk.checked) checkedIndices.add(idx);
  else checkedIndices.delete(idx);
  chk.closest("tr").classList.toggle("selected-row", chk.checked);
  updateSelCount();

  // 전체선택 체크박스 상태 동기화
  const all = document.querySelectorAll(".row-chk");
  const allChecked = [...all].every(c => c.checked);
  document.getElementById("chk-all").checked = allChecked;
}

function updateSelCount() {
  const cnt = checkedIndices.size;
  document.getElementById("sel-cnt").textContent = cnt;
  document.getElementById("sel-cnt2").textContent = cnt;
  document.getElementById("s-selected").textContent = cnt;
}

// ── 중복 체크 ────────────────────────────────
async function checkDuplicate() {
  if (checkedIndices.size === 0) {
    addLog("⚠️ 먼저 상품을 선택해주세요", "warn");
    return;
  }
  addLog("🔍 중복 체크 중...", "info");
  try {
    const r = await fetch(PREFIX + "/products/check-duplicate", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ indices: [...checkedIndices] })
    });
    const d = await r.json();
    renderDupAlert(d);
  } catch(e) { addLog("❌ 중복 체크 실패: " + e, "err"); }
}

function renderDupAlert(d) {
  const area = document.getElementById("dup-area");
  let html = "";

  if (d.block && d.block.length > 0) {
    html += `<div class="dup-alert">
      <div class="dup-title">🚫 업로드 차단 (동일 가격 중복 ${d.block.length}개)</div>`;
    d.block.forEach(b => {
      html += `<div>• ${b.name} — ${b.reason}</div>`;
      checkedIndices.delete(b.idx); // 자동 선택 해제
    });
    html += `</div>`;
    addLog(`🚫 ${d.block.length}개 상품이 중복으로 차단되었습니다`, "err");
  }

  if (d.price_changed && d.price_changed.length > 0) {
    html += `<div class="price-change">
      <div class="pc-title">⚠️ 가격 변동 감지 (${d.price_changed.length}개) — 업로드 가능</div>`;
    d.price_changed.forEach(p => {
      const arrow = p.diff > 0 ? "▲" : "▼";
      const color = p.diff > 0 ? "#f87171" : "#4ade80";
      html += `<div>• ${p.name} &nbsp; ¥${p.old_price.toLocaleString()} → <span style="color:${color}">${arrow} ¥${p.new_price.toLocaleString()}</span></div>`;
    });
    html += `</div>`;
    addLog(`⚠️ ${d.price_changed.length}개 상품 가격 변동 감지`, "warn");
  }

  if (d.ok && d.ok.length > 0) {
    addLog(`✅ ${d.ok.length}개 상품 중복 없음 — 업로드 가능`, "ok");
  }

  area.innerHTML = html;
  updateSelCount();
  loadProducts(curPage); // 체크박스 상태 갱신
}

// ── 상품 목록 로드 ────────────────────────────
async function loadProducts(page = 1) {
  curPage = page;
  const brand = document.getElementById("brand-select")?.value || "ALL";
  const search = document.getElementById("search-input")?.value || "";

  try {
    const url = `${PREFIX}/products?page=${page}&per_page=${PER}&brand=${encodeURIComponent(brand)}&search=${encodeURIComponent(search)}`;
    const d = await fetch(url).then(r => r.json());
    const tb = document.getElementById("tbody");

    if (!d.products || d.products.length === 0) {
      tb.innerHTML = `<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:40px">
        ${search||brand!=="ALL" ? "검색 결과가 없습니다." : "스크래핑을 먼저 실행하세요."}</td></tr>`;
      document.getElementById("filter-result").textContent = "0개";
      return;
    }

    document.getElementById("filter-result").textContent = `총 ${d.total.toLocaleString()}개`;

    // 현재 페이지 상품 인덱스 계산
    const startIdx = (page - 1) * PER;
    pageIndexMap = d.products.map((_, i) => startIdx + i);

    tb.innerHTML = d.products.map((p, i) => {
      const globalIdx = startIdx + i;
      const isChecked = checkedIndices.has(globalIdx);
      const img  = p.img_url ? `<img class="pimg" src="${p.img_url}" onerror="this.style.opacity=0">` : `<div class="pimg"></div>`;
      const brand = p.brand ? `<span class="badge b-brand">${p.brand}</span>` : "-";
      const code  = p.product_code ? `<span class="badge b-code">${p.product_code}</span>` : "-";
      const jpy   = p.price_jpy ? `<span class="badge b-jpy">¥${p.price_jpy.toLocaleString()}</span>` : "-";
      const krw   = p.price_info ? `<span class="badge b-krw">${p.price_info.price_final.toLocaleString()}원</span>` : "-";
      const link  = p.link ? `<a href="${p.link}" target="_blank" style="color:var(--accent);font-size:0.75rem">보기 →</a>` : "-";
      const time  = (p.scraped_at||"").substring(0,16);
      return `<tr class="${isChecked?'selected-row':''}">
        <td><input type="checkbox" class="row-chk" data-idx="${globalIdx}" ${isChecked?'checked':''} onchange="onRowCheck(this)"></td>
        <td>${img}</td>
        <td>${brand}</td>
        <td style="max-width:220px;word-break:break-word;font-size:0.8rem">${p.name||"-"}</td>
        <td>${code}</td>
        <td>${jpy}</td>
        <td>${krw}</td>
        <td>${link}</td>
        <td style="color:var(--muted);font-size:0.72rem">${time}</td>
      </tr>`;
    }).join("");

    renderPager(page, Math.ceil(d.total / PER));

  } catch(e) { console.error(e); }
}

function renderPager(cur, total) {
  const pg = document.getElementById("pager");
  if (total <= 1) { pg.innerHTML=""; return; }
  let h = `<button onclick="loadProducts(${cur-1})" ${cur===1?"disabled":""}>◀</button>`;
  const start = Math.max(1, cur-3);
  const end   = Math.min(total, cur+3);
  if (start > 1) h += `<button onclick="loadProducts(1)">1</button><span style="color:var(--muted)">...</span>`;
  for (let i=start; i<=end; i++)
    h += `<button class="${i===cur?'on':''}" onclick="loadProducts(${i})">${i}</button>`;
  if (end < total) h += `<span style="color:var(--muted)">...</span><button onclick="loadProducts(${total})">${total}</button>`;
  h += `<button onclick="loadProducts(${cur+1})" ${cur===total?"disabled":""}>▶</button>`;
  pg.innerHTML = h;
}

// ── 상태 폴링 ────────────────────────────────
async function refreshStatus() {
  try {
    const d = await fetch(PREFIX + "/status").then(r => r.json());
    document.getElementById("rate").textContent       = (d.rate||0).toFixed(2) + "원";
    document.getElementById("s-count").textContent    = (d.product_count||0).toLocaleString();
    document.getElementById("s-uploaded").textContent = d.uploaded_count || 0;
    document.getElementById("s-last-scrape").textContent = d.last_scrape || "-";
    document.getElementById("s-last-upload").textContent = d.last_upload || "-";
    document.getElementById("s-schedule").textContent    = d.schedule_time || "-";

    const scEl = document.getElementById("s-scraping");
    const pauseBtn = document.getElementById("btn-pause");
    if (d.scraping) {
      scEl.innerHTML = `<span class="c-yellow">실행 중 <span class="spinner"></span>${d.paused?' (일시정지)':''}</span>`;
      setBtn(false);
      pauseBtn.style.display = "inline-flex";
    } else {
      scEl.innerHTML = '<span class="c-green">대기 중 ✓</span>';
      setBtn(true);
      pauseBtn.style.display = "none";
      if (isPaused) isPaused = false;
    }
    document.getElementById("s-upload-status").textContent = d.uploading ? "업로드 진행 중..." : "대기중";

    // 수집 완료 후 상품 목록/브랜드 자동 갱신
    if (!d.scraping && d.product_count > 0) {
      const curCount = +document.getElementById("s-count").textContent.replace(/,/g,"");
    }
  } catch(e) {}
}

// ── 초기화 ───────────────────────────────────
refreshStatus();
loadProducts(1);
loadBrands();
setInterval(refreshStatus, 4000);
setInterval(() => { loadProducts(curPage); loadBrands(); }, 15000);
</script>
