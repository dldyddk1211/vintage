<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheOne - 회원가입</title>
  <style>
    :root {
      --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a;
      --accent:#4f8ef7; --accent2:#7c5cbf;
      --green:#2ecc71; --red:#e74c3c; --yellow:#f39c12;
      --text:#e0e0e0; --muted:#7a7f9a;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'Noto Sans KR',sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    .signup-container { width:100%; max-width:420px; padding:20px; }
    .signup-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; padding:40px 36px; text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
    }
    .signup-logo {
      font-size:1.6rem; font-weight:800;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:6px;
    }
    .signup-sub { font-size:0.82rem; color:var(--muted); margin-bottom:32px; }
    .form-group { margin-bottom:18px; text-align:left; }
    .form-group label {
      display:block; font-size:0.78rem; color:var(--muted);
      margin-bottom:6px; letter-spacing:.03em;
    }
    .form-group input {
      width:100%; padding:12px 14px;
      background:#0f1117; border:1px solid var(--border);
      border-radius:8px; color:var(--text);
      font-size:0.92rem; outline:none; transition:border-color .2s;
    }
    .form-group input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(79,142,247,0.15);
    }
    .signup-btn {
      width:100%; padding:13px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      border:none; border-radius:8px;
      color:#fff; font-size:0.95rem; font-weight:700;
      cursor:pointer; transition:opacity .15s, transform .1s;
      margin-top:8px;
    }
    .signup-btn:hover { opacity:.9; }
    .signup-btn:active { transform:scale(.98); }
    .error-msg {
      background:rgba(231,76,60,0.12); border:1px solid rgba(231,76,60,0.3);
      border-radius:8px; padding:10px 14px;
      color:var(--red); font-size:0.82rem;
      margin-bottom:18px; display:none;
    }
    .error-msg.show { display:block; }
    .link-row {
      margin-top:20px; font-size:0.82rem;
    }
    .link-row a {
      color:var(--accent); text-decoration:none;
    }
    .link-row a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-logo">TheOne</div>
      <div class="signup-sub">회원가입</div>

      <div class="error-msg {% if error %}show{% endif %}" id="errorMsg">
        {{ error or '' }}
      </div>

      <form method="POST" action="{{ url_prefix }}/signup">
        <div class="form-group">
          <label>아이디 <span style="color:var(--red)">*</span></label>
          <input type="text" name="username" placeholder="아이디를 입력하세요" autofocus required>
        </div>
        <div class="form-group">
          <label>비밀번호 <span style="color:var(--red)">*</span></label>
          <input type="password" name="password" placeholder="4자 이상" required minlength="4">
        </div>
        <div class="form-group">
          <label>이름</label>
          <input type="text" name="name" placeholder="이름 (선택)">
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="tel" name="phone" placeholder="010-0000-0000 (선택)">
        </div>
        <button type="submit" class="signup-btn">회원가입</button>
      </form>

      <div class="link-row">
        이미 계정이 있으신가요? <a href="{{ url_prefix }}/login">로그인</a>
      </div>
    </div>
  </div>
</body>
</html>
