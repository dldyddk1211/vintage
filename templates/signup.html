<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheOne - 회원가입</title>
  <style>
    :root {
      --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a;
      --accent:#4f8ef7; --accent2:#7c5cbf;
      --green:#2ecc71; --red:#e74c3c; --yellow:#f39c12;
      --text:#e0e0e0; --muted:#7a7f9a;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body {
      background:var(--bg); color:var(--text);
      font-family:'Noto Sans KR',sans-serif;
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    .signup-container { width:100%; max-width:420px; padding:20px; }
    .signup-card {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; padding:40px 36px; text-align:center;
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
    }
    .signup-logo {
      font-size:1.6rem; font-weight:800;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:6px;
    }
    .signup-sub { font-size:0.82rem; color:var(--muted); margin-bottom:32px; }
    .form-group { margin-bottom:18px; text-align:left; }
    .form-group label {
      display:block; font-size:0.78rem; color:var(--muted);
      margin-bottom:6px; letter-spacing:.03em;
    }
    .form-group input {
      width:100%; padding:12px 14px;
      background:#0f1117; border:1px solid var(--border);
      border-radius:8px; color:var(--text);
      font-size:0.92rem; outline:none; transition:border-color .2s;
    }
    .form-group input:focus {
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(79,142,247,0.15);
    }
    .signup-btn {
      width:100%; padding:13px;
      background:linear-gradient(135deg, var(--accent), var(--accent2));
      border:none; border-radius:8px;
      color:#fff; font-size:0.95rem; font-weight:700;
      cursor:pointer; transition:opacity .15s, transform .1s;
      margin-top:8px;
    }
    .signup-btn:hover { opacity:.9; }
    .signup-btn:active { transform:scale(.98); }
    .error-msg {
      background:rgba(231,76,60,0.12); border:1px solid rgba(231,76,60,0.3);
      border-radius:8px; padding:10px 14px;
      color:var(--red); font-size:0.82rem;
      margin-bottom:18px; display:none;
    }
    .error-msg.show { display:block; }
    .link-row {
      margin-top:20px; font-size:0.82rem;
    }
    .link-row a {
      color:var(--accent); text-decoration:none;
    }
    .link-row a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="signup-container">
    <div class="signup-card">
      <div class="signup-logo">TheOne</div>
      <div class="signup-sub">회원가입</div>

      {% if success %}
      <div style="background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.3);border-radius:8px;padding:20px;margin-bottom:18px;text-align:center;">
        <div style="font-size:1.4rem;margin-bottom:8px;">&#x2705;</div>
        <div style="color:#2ecc71;font-size:0.95rem;font-weight:700;margin-bottom:8px;">회원가입이 완료되었습니다!</div>
        <div style="color:#8a8fa0;font-size:0.82rem;line-height:1.6;">
          관리자 승인 후 로그인이 가능합니다.<br>
          승인까지 잠시 기다려주세요.
        </div>
        <a href="{{ url_prefix }}/login" style="display:inline-block;margin-top:16px;padding:10px 28px;background:linear-gradient(135deg,#4f8ef7,#7c5cbf);border-radius:8px;color:#fff;font-size:0.88rem;font-weight:700;text-decoration:none;">로그인 페이지로</a>
      </div>
      {% else %}

      <div class="error-msg {% if error %}show{% endif %}" id="errorMsg">
        {{ error or '' }}
      </div>

      <form method="POST" action="{{ url_prefix }}/signup">
        <div class="form-group">
          <label>아이디 <span style="color:var(--red)">*</span></label>
          <input type="text" name="username" placeholder="아이디를 입력하세요" autofocus required>
        </div>
        <div class="form-group">
          <label>비밀번호 <span style="color:var(--red)">*</span></label>
          <input type="password" name="password" placeholder="4자 이상" required minlength="4">
        </div>
        <div class="form-group">
          <label>이메일 <span style="color:var(--red)">*</span></label>
          <input type="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label>이름</label>
          <input type="text" name="name" placeholder="이름 (선택)">
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="tel" name="phone" placeholder="010-0000-0000 (선택)">
        </div>

        <div style="border-top:1px solid var(--border);margin:20px 0 14px;padding-top:14px;">
          <div style="font-size:0.78rem;color:var(--accent);font-weight:700;margin-bottom:12px;">배송 정보 (구매대행용)</div>
        </div>
        <div class="form-group">
          <label>우편번호</label>
          <div style="display:flex;gap:6px;">
            <input type="text" name="postal_code" id="signup-postal" placeholder="12345" readonly style="width:120px;">
            <button type="button" onclick="signupPostcode()" style="padding:8px 14px;background:var(--accent);border:none;border-radius:8px;color:#fff;font-size:0.82rem;cursor:pointer;white-space:nowrap;">주소 검색</button>
          </div>
        </div>
        <div class="form-group">
          <label>주소</label>
          <input type="text" name="address" id="signup-address" placeholder="주소 검색 버튼을 눌러주세요" readonly>
        </div>
        <div class="form-group">
          <label>상세주소</label>
          <input type="text" name="address_detail" id="signup-address2" placeholder="상세주소 (동/호수)">
        </div>
        <div class="form-group">
          <label>개인통관고유번호</label>
          <input type="text" name="customs_id" placeholder="P000-0000-000000 (선택)">
        </div>
        <button type="submit" class="signup-btn">회원가입</button>
      </form>

      <!-- 소셜 로그인 -->
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
        <div style="font-size:0.72rem;color:var(--muted);margin-bottom:10px;">간편 가입</div>
        <a href="{{ url_prefix }}/auth/naver" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:12px;border-radius:8px;background:#03C75A;color:#fff;font-size:0.9rem;font-weight:700;text-decoration:none;transition:opacity .15s;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M16.273 12.845L7.376 0H0v24h7.727V11.155L16.624 24H24V0h-7.727z"/></svg>
          네이버로 시작하기
        </a>
      </div>

      <div class="link-row">
        이미 계정이 있으신가요? <a href="{{ url_prefix }}/login">로그인</a>
      </div>
      {% endif %}
    </div>
  </div>
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
function signupPostcode() {
  new daum.Postcode({
    oncomplete: function(data) {
      document.getElementById("signup-postal").value = data.zonecode;
      document.getElementById("signup-address").value = data.roadAddress || data.jibunAddress;
      document.getElementById("signup-address2").focus();
    }
  }).open();
}
</script>
</body>
</html>
