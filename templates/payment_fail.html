<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheOne - 결제 실패</title>
  <style>
    :root { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --red:#e74c3c; --text:#e0e0e0; --muted:#7a7f9a; --accent:#d4a54a; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; max-width:420px; width:95%; text-align:center; }
    .icon { font-size:3rem; margin-bottom:16px; }
    .title { font-size:1.2rem; font-weight:700; color:var(--red); margin-bottom:12px; }
    .msg { font-size:0.88rem; color:var(--muted); margin-bottom:24px; line-height:1.6; }
    .btn { display:inline-block; padding:12px 28px; border-radius:8px; background:var(--accent); color:#000; font-weight:700; text-decoration:none; font-size:0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <div class="title">결제 실패</div>
    <div class="msg">{{ message }}</div>
    <a href="{{ url_prefix }}/shop" class="btn">쇼핑몰로 돌아가기</a>
  </div>
</body>
</html>
