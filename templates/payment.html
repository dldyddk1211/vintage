<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheOne - 결제</title>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    :root { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --accent:#d4a54a; --text:#e0e0e0; --muted:#7a7f9a; --green:#2ecc71; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
    .pay-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:40px; max-width:460px; width:95%; text-align:center; }
    .pay-logo { font-size:1.4rem; font-weight:800; color:var(--accent); margin-bottom:24px; }
    .pay-info { margin-bottom:24px; }
    .pay-label { font-size:0.82rem; color:var(--muted); margin-bottom:4px; }
    .pay-value { font-size:1rem; font-weight:600; margin-bottom:12px; }
    .pay-price { font-size:1.8rem; font-weight:800; color:var(--green); margin:16px 0; }
    .pay-btn { width:100%; padding:16px; border:none; border-radius:10px; background:var(--accent); color:#000; font-size:1rem; font-weight:800; cursor:pointer; transition:opacity .2s; }
    .pay-btn:hover { opacity:0.88; }
    .pay-back { display:block; margin-top:16px; color:var(--muted); font-size:0.85rem; text-decoration:none; }
    .pay-back:hover { color:var(--accent); }
  </style>
</head>
<body>
  <div class="pay-card">
    <div class="pay-logo">TheOne Vintage</div>
    <div class="pay-info">
      <div class="pay-label">상품</div>
      <div class="pay-value" id="pay-name">-</div>
      <div class="pay-label">고유번호</div>
      <div class="pay-value" id="pay-code">-</div>
      <div class="pay-price" id="pay-price">0원</div>
      <div style="font-size:0.75rem;color:var(--muted);">(관부가세, 해외배송비 미포함)</div>
    </div>
    <button class="pay-btn" onclick="startPayment()">결제하기</button>
    <a href="{{ url_prefix }}/shop" class="pay-back">쇼핑몰로 돌아가기</a>
  </div>

<script>
const PREFIX = "{{ url_prefix }}";
const clientKey = "{{ toss_client_key }}";

// URL 파라미터에서 상품 정보
const params = new URLSearchParams(location.search);
const brand = params.get("brand") || "";
const name = params.get("name") || "";
const code = params.get("code") || "";
const amount = parseInt(params.get("amount")) || 0;

document.getElementById("pay-name").textContent = `${brand} ${name}`;
document.getElementById("pay-code").textContent = code;
document.getElementById("pay-price").textContent = amount.toLocaleString() + "원";

async function startPayment() {
  if (!amount || amount <= 0) { alert("결제 금액 오류"); return; }

  const tossPayments = TossPayments(clientKey);
  const orderId = "ORD-" + Date.now() + "-" + Math.random().toString(36).substr(2,6);

  try {
    const payment = tossPayments.payment({customerKey: "{{ username }}"});
    await payment.requestPayment({
      method: "CARD",
      amount: { currency: "KRW", value: amount },
      orderId: orderId,
      orderName: `${brand} ${name}`.substring(0, 100),
      successUrl: location.origin + PREFIX + "/shop/payment/success",
      failUrl: location.origin + PREFIX + "/shop/payment/fail",
    });
  } catch(e) {
    if (e.code === "USER_CANCEL") {
      // 사용자가 결제창 닫음
    } else {
      alert("결제 오류: " + (e.message || e));
    }
  }
}
</script>
</body>
</html>
