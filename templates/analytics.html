<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheOne Vintage — 접속 통계</title>
  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_prefix }}/static/favicon-32x32.png">
  <style>
    :root {
      --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a;
      --accent:#d4a54a; --green:#2ecc71; --red:#e74c3c; --yellow:#f39c12; --blue:#4f8ef7;
      --text:#e0e0e0; --muted:#7a7f9a; --dim:#444860;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; }
    .header { background:var(--card); border-bottom:1px solid var(--border); padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
    .header-logo { font-size:1.2rem; font-weight:800; color:var(--accent); }
    .header-logo span { color:var(--text); font-weight:300; margin-left:6px; font-size:0.9rem; }
    .header-nav { display:flex; gap:12px; font-size:0.82rem; }
    .header-nav a { color:var(--muted); text-decoration:none; padding:6px 12px; border-radius:6px; transition:all .15s; }
    .header-nav a:hover { color:var(--accent); background:rgba(212,165,74,0.1); }
    .container { max-width:1100px; margin:20px auto; padding:0 16px; }
    .panel { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:16px; }
    .panel-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; font-size:0.95rem; font-weight:700; }
    .btn { padding:5px 12px; border:none; border-radius:6px; cursor:pointer; font-size:0.78rem; font-weight:600; }
    .b-gray { background:var(--bg); color:var(--muted); border:1px solid var(--border); }
    .tbl { border-collapse:collapse; }
    .tbl th, .tbl td { padding:6px 10px; border-bottom:1px solid var(--border); text-align:left; }
    .tbl th { color:var(--muted); font-size:0.72rem; font-weight:600; }
    @media(max-width:768px) {
      .container { padding:0 8px; }
      .panel { padding:14px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-logo">TheOne<span>Vintage</span></div>
    <div class="header-nav">
      <a href="{{ url_prefix }}/orders-page">주문</a>
      <a href="{{ url_prefix }}/members-page">회원</a>
      <a href="{{ url_prefix }}/todo">ToDo</a>
      <a href="{{ url_prefix }}/dashboard">대시보드</a>
    </div>
  </div>
  <div class="container">
    <div class="panel">
      <div class="panel-title">
        <span>&#x1f4ca; 접속 통계</span>
        <div style="display:flex;gap:6px;">
          <select id="period" onchange="load()" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:6px;font-size:0.78rem;">
            <option value="today" selected>오늘</option>
            <option value="yesterday">어제</option>
            <option value="7d">최근 7일</option>
            <option value="30d">최근 30일</option>
          </select>
          <button class="btn b-gray" onclick="load()">&#x1f504;</button>
        </div>
      </div>
      <!-- 요약 -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:16px;">
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-size:0.68rem;color:var(--muted);">총 방문</div>
          <div style="font-size:1.2rem;font-weight:800;color:var(--accent);" id="s-total">-</div>
        </div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-size:0.68rem;color:var(--muted);">오늘</div>
          <div style="font-size:1.2rem;font-weight:800;color:var(--green);" id="s-today">-</div>
        </div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-size:0.68rem;color:var(--muted);">순방문자</div>
          <div style="font-size:1.2rem;font-weight:800;" id="s-unique">-</div>
        </div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-size:0.68rem;color:var(--muted);">검색유입</div>
          <div style="font-size:1.2rem;font-weight:800;color:var(--yellow);" id="s-search">-</div>
        </div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-size:0.68rem;color:var(--muted);">회원</div>
          <div style="font-size:1.2rem;font-weight:800;color:var(--blue);" id="s-member">-</div>
        </div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-size:0.68rem;color:var(--muted);">비회원</div>
          <div style="font-size:1.2rem;font-weight:800;color:var(--dim);" id="s-guest">-</div>
        </div>
      </div>
      <!-- 그리드 -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:16px;">
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;">
          <div style="font-size:0.78rem;font-weight:600;margin-bottom:8px;">&#x1f310; 유입 경로</div>
          <div id="s-ref" style="font-size:0.76rem;"></div>
        </div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;">
          <div style="font-size:0.78rem;font-weight:600;margin-bottom:8px;">&#x1f50d; 검색 키워드</div>
          <div id="s-kw" style="font-size:0.76rem;"></div>
        </div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;">
          <div style="font-size:0.78rem;font-weight:600;margin-bottom:8px;">&#x1f465; 회원 접속</div>
          <div id="s-mem" style="font-size:0.76rem;"></div>
        </div>
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;">
          <div style="font-size:0.78rem;font-weight:600;margin-bottom:8px;">&#x1f4f1; 디바이스</div>
          <div id="s-dev" style="font-size:0.76rem;"></div>
        </div>
      </div>
      <!-- 로그 -->
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-size:0.78rem;font-weight:600;">&#x1f4cb; 최근 접속</span>
          <span id="s-log-info" style="font-size:0.68rem;color:var(--muted);"></span>
        </div>
        <div style="overflow-x:auto;">
          <table class="tbl" style="width:100%;font-size:0.73rem;">
            <thead><tr><th>시간</th><th>회원</th><th>IP</th><th>페이지</th><th>유입</th><th>기기</th></tr></thead>
            <tbody id="s-log"><tr><td colspan="6" style="text-align:center;color:var(--muted);padding:20px;">로딩 중...</td></tr></tbody>
          </table>
        </div>
        <div id="s-log-paging" style="display:flex;justify-content:center;gap:6px;margin-top:10px;"></div>
      </div>
    </div>
  </div>
<script>
const P = "{{ url_prefix }}";
let _logPage = 1;
function row(a,b,c) { return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${a}</span><span style="font-weight:600;color:${c||'var(--accent)'};margin-left:8px;">${b}</span></div>`; }
async function load(logPage) {
  if (logPage) _logPage = logPage;
  const p = document.getElementById("period").value;
  try {
    const r = await fetch(P+"/api/analytics?period="+p+"&log_page="+_logPage);
    const d = await r.json();
    if (!d.ok) return;
    document.getElementById("s-total").textContent = (d.total||0).toLocaleString();
    document.getElementById("s-today").textContent = (d.today||0).toLocaleString();
    document.getElementById("s-unique").textContent = (d.unique||0).toLocaleString();
    document.getElementById("s-search").textContent = (d.search_count||0).toLocaleString();
    document.getElementById("s-member").textContent = (d.member_count||0).toLocaleString();
    document.getElementById("s-guest").textContent = (d.guest_count||0).toLocaleString();
    document.getElementById("s-ref").innerHTML = (d.referrers||[]).map(r=>row(r.name,r.count)).join("") || '<div style="color:var(--muted);">없음</div>';
    document.getElementById("s-kw").innerHTML = (d.keywords||[]).map(k=>row(k.keyword,k.count,'var(--yellow)')).join("") || '<div style="color:var(--muted);">없음</div>';
    document.getElementById("s-mem").innerHTML = (d.members||[]).map(m=>row(`${m.name||m.username} <span style="font-size:0.65rem;color:var(--dim);">${(m.last||'').slice(5,16)}</span>`,m.count+'회','var(--blue)')).join("") || '<div style="color:var(--muted);">없음</div>';
    document.getElementById("s-dev").innerHTML = (d.devices||[]).map(v=>row(v.name,v.count,'var(--green)')).join("") || '<div style="color:var(--muted);">없음</div>';
    document.getElementById("s-log").innerHTML = (d.logs||[]).map(l=>{
      const ipD = l.region ? `${l.region} <span style="font-size:0.62rem;color:var(--dim);">(${l.ip})</span>` : l.ip;
      return `<tr><td>${l.time}</td><td style="font-weight:600;color:${l.member_type==='회원'?'var(--accent)':'var(--dim)'};">${l.name||l.username||'비회원'}</td><td>${ipD}</td><td>${l.path}</td><td>${l.referrer||'직접'}</td><td>${l.device}</td></tr>`;
    }).join("") || '<tr><td colspan="6" style="text-align:center;color:var(--muted);">없음</td></tr>';
    // 페이지네이션
    const info = document.getElementById("s-log-info");
    const pg = document.getElementById("s-log-paging");
    if (d.log_pages > 1) {
      info.textContent = `${d.log_total}건 중 ${(_logPage-1)*30+1}~${Math.min(_logPage*30, d.log_total)}`;
      let h = '';
      if (_logPage > 1) h += `<button class="btn b-gray" onclick="load(${_logPage-1})" style="font-size:0.68rem;padding:3px 8px;">◀</button>`;
      for (let i = Math.max(1,_logPage-3); i <= Math.min(d.log_pages,_logPage+3); i++)
        h += `<button class="btn ${i===_logPage?'b-blue':'b-gray'}" onclick="load(${i})" style="font-size:0.68rem;padding:3px 8px;min-width:28px;">${i}</button>`;
      if (_logPage < d.log_pages) h += `<button class="btn b-gray" onclick="load(${_logPage+1})" style="font-size:0.68rem;padding:3px 8px;">▶</button>`;
      pg.innerHTML = h;
    } else { info.textContent = d.log_total ? `${d.log_total}건` : ''; pg.innerHTML = ''; }
  } catch(e) {}
}
load();
</script>
</body>
</html>
